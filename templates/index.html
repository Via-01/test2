<!DOCTYPE html>
<html>
<head>
    <title>LifeLink Donor Management</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        form { margin-bottom: 20px; }
        input, button { padding: 10px; margin-right: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Add a New Donor</h1>
    <form id="donorForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="bloodType" placeholder="Blood Type" required>
        <button type="submit">Add Donor</button>
    </form>

    <h2>Our Donors</h2>
    <ul id="donorsList"></ul>

    <script>
        // JavaScript to connect the frontend to the backend
        async function fetchDonors() {
            const response = await fetch('http://127.0.0.1:8000/donors');
            const donors = await response.json();
            const donorsList = document.getElementById('donorsList');
            donorsList.innerHTML = ''; // Clear the list
            donors.forEach(donor => {
                const li = document.createElement('li');
                li.textContent = `Name: ${donor.name}, Blood Type: ${donor.blood_type}`;
                donorsList.appendChild(li);
            });
        }

        document.getElementById('donorForm').addEventListener('submit', async (event) => {
            event.preventDefault(); // Stop the form from refreshing the page
            const name = document.getElementById('name').value;
            const bloodType = document.getElementById('bloodType').value;
            
            const response = await fetch('http://127.0.0.1:8000/donors', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ name, blood_type: bloodType }),
            });
            
            if (response.ok) {
                document.getElementById('donorForm').reset(); // Clear the form
                fetchDonors(); // Refresh the list
            } else {
                console.error('Failed to add donor');
            }
        });

        // Fetch donors when the page first loads
        fetchDonors();
    </script>
</body>
</html>
