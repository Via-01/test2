<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>500 — Server Error — LifeLink</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fraunces:wght@700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0d1b2a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
    .wrap{max-width:440px;}
    .code{font-family:'Fraunces',serif;font-size:96px;font-weight:700;color:#e74c3c;line-height:1;margin-bottom:16px;}
    h1{font-family:'Fraunces',serif;font-size:24px;margin-bottom:12px;}
    p{color:rgba(255,255,255,.55);font-size:15px;line-height:1.6;margin-bottom:28px;}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    a{display:inline-block;padding:11px 24px;background:#c0392b;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;transition:background .15s;}
    a:hover{background:#e74c3c;}
    a.ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);}
    a.ghost:hover{background:rgba(255,255,255,.15);}
  </style>
</head>
<body>
<div class="wrap">
  <div class="code">500</div>
  <h1>Internal server error</h1>
  <p>Something went wrong on our end. The error has been logged. Try again in a moment — if it persists, contact your system administrator.</p>
  <div class="actions">
    <a href="/">← Dashboard</a>
    <a href="javascript:history.back()" class="ghost">Go back</a>
  </div>
</div>
</body>
</html>
