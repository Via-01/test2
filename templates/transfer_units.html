<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f8f8f8; }
        .container { max-width: 600px; margin: auto; padding: 20px; background-color: #fff; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #A00; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .message { padding: 10px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; text-align: center; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        
        <p><a href="{{ url_for('inventory.view_inventory_stock') }}">&larr; Back to Inventory Stock</a></p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="message {{ category }}">
                        {{ message }}
                    </p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('inventory.execute_transfer') }}">
            <div class="form-group">
                <label for="blood_type">Blood Type to Transfer:</label>
                <select id="blood_type" name="blood_type" required>
                    <option value="A_POSITIVE">A Positive</option>
                    <option value="A_NEGATIVE">A Negative</option>
                    <option value="B_POSITIVE">B Positive</option>
                    <option value="B_NEGATIVE">B Negative</option>
                    <option value="O_POSITIVE">O Positive</option>
                    <option value="O_NEGATIVE">O Negative</option>
                    <option value="AB_POSITIVE">AB Positive</option>
                    <option value="AB_NEGATIVE">AB Negative</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="source_unit">Source Storage Unit ID:</label>
                <select id="source_unit" name="source_unit" required>
                    {% for unit_id in unit_ids %}
                    <option value="{{ unit_id }}">{{ unit_id }}</option>
                    {% endfor %}
                    </select>
            </div>

            <div class="form-group">
                <label for="dest_unit">Destination Storage Unit ID:</label>
                <select id="dest_unit" name="dest_unit" required>
                    {% for unit_id in unit_ids %}
                    <option value="{{ unit_id }}">{{ unit_id }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity (mL):</label>
                <input type="number" id="quantity" name="quantity" required min="10" placeholder="e.g., 250">
            </div>

            <button type="submit" class="button">Execute Transfer</button>
        </form>
    </div>
</body>
</html>
